{% extends 'myadmin/base.html' %}

{% block main_body %}
<section class="content-header">
  <h1>收费管理 <small>添加缴费记录</small></h1>
</section>

<section class="content container-fluid">
  <div class="row">
    <div class="col-md-6">
      <div class="box box-primary">
        <div class="box-header with-border">
          <h3 class="box-title">为 {{ client.name }} 添加缴费记录</h3>
        </div>
        <form action="{% url 'myadmin_fee_add' client.id %}" method="post">
          {% csrf_token %}
          <div class="box-body">
            <div class="form-group">
              <label>应收日期 <span class="text-red">*</span></label>
              <input type="date" name="due_date" class="form-control" required>
            </div>
            <div class="form-group">
              <label>应收金额（元）</label>
              <input type="number" name="due_amount" class="form-control" step="0.01" value="{{ client.fee_amount }}">
            </div>
          </div>
          <div class="box-footer">
            <button type="submit" class="btn btn-primary">提 交</button>
            <a href="{% url 'myadmin_client_detail' client.id %}" class="btn btn-default">返 回</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
