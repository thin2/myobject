{% extends 'myadmin/base.html' %}

{% block main_body %}
<section class="content-header">
  <h1>收费管理 <small>确认收款</small></h1>
</section>

<section class="content container-fluid">
  <div class="row">
    <div class="col-md-6">
      <div class="box box-primary">
        <div class="box-header with-border">
          <h3 class="box-title">确认收款 - {{ fee.client.name }}</h3>
        </div>
        <form action="{% url 'myadmin_fee_pay' fee.id %}" method="post">
          {% csrf_token %}
          <div class="box-body">
            <p>应收日期：<strong>{{ fee.due_date|date:"Y-m-d" }}</strong></p>
            <p>应收金额：<strong>{{ fee.due_amount }} 元</strong></p>
            <hr>
            <div class="form-group">
              <label>实收日期</label>
              <input type="date" name="paid_date" class="form-control" value="{{ today }}">
            </div>
            <div class="form-group">
              <label>实收金额（元）</label>
              <input type="number" name="paid_amount" class="form-control" step="0.01" value="{{ fee.due_amount }}">
            </div>
            <div class="form-group">
              <label>备注</label>
              <textarea name="remark" class="form-control" rows="2"></textarea>
            </div>
          </div>
          <div class="box-footer">
            <button type="submit" class="btn btn-primary">确认收款</button>
            <a href="{% url 'myadmin_fee_index' 1 %}" class="btn btn-default">返 回</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
