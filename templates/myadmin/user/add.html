{% extends 'myadmin/base.html' %}

{% block main_body %}
<section class="content-header">
  <h1>员工管理 <small>添加员工</small></h1>
  <ol class="breadcrumb">
    <li><a href="{% url 'myadmin_index' %}"><i class="fa fa-dashboard"></i> 首页</a></li>
    <li><a href="{% url 'myadmin_user_index' 1 %}">员工管理</a></li>
    <li class="active">添加员工</li>
  </ol>
</section>

<section class="content container-fluid">
  <div class="row">
    <div class="col-md-8">
      <div class="box box-primary">
        <div class="box-header with-border">
          <h3 class="box-title">添加员工信息</h3>
        </div>
        {% if error %}
        <div class="alert alert-danger" style="margin:10px;">{{ error }}</div>
        {% endif %}
        <form action="{% url 'myadmin_user_insert' %}" method="post">
          {% csrf_token %}
          <div class="box-body">
            <div class="form-group">
              <label>账号 <span class="text-red">*</span></label>
              <input type="text" name="username" class="form-control" placeholder="登录账号" required>
            </div>
            <div class="form-group">
              <label>密码 <span class="text-red">*</span></label>
              <input type="password" name="password" class="form-control" placeholder="登录密码" required>
            </div>
            <div class="form-group">
              <label>姓名 <span class="text-red">*</span></label>
              <input type="text" name="first_name" class="form-control" placeholder="真实姓名" required>
            </div>
            <div class="form-group">
              <label>角色</label>
              <select name="role" class="form-control">
                {% for val, label in role_choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label>手机号</label>
              <input type="text" name="phone" class="form-control" placeholder="手机号">
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>性别</label>
                  <select name="gender" class="form-control">
                    <option value="">--请选择--</option>
                    {% for val, label in gender_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>年龄</label>
                  <input type="number" name="age" class="form-control" placeholder="年龄">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>学历</label>
                  <select name="education" class="form-control">
                    <option value="">--请选择--</option>
                    {% for val, label in education_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>专业</label>
                  <input type="text" name="major" class="form-control" placeholder="专业">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>证书</label>
                  <select name="certificate" class="form-control">
                    {% for val, label in certificate_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>工龄（年）</label>
                  <input type="number" name="work_years" class="form-control" value="0">
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>入职日期</label>
              <input type="date" name="hire_date" class="form-control">
            </div>
          </div>
          <div class="box-footer">
            <button type="submit" class="btn btn-primary">提 交</button>
            <a href="{% url 'myadmin_user_index' 1 %}" class="btn btn-default">返 回</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
