{% extends 'myadmin/base.html' %}

{% block main_body %}
<section class="content-header">
  <h1>客户管理 <small>添加客户</small></h1>
  <ol class="breadcrumb">
    <li><a href="{% url 'myadmin_index' %}"><i class="fa fa-dashboard"></i> 首页</a></li>
    <li><a href="{% url 'myadmin_client_index' 1 %}">客户管理</a></li>
    <li class="active">添加客户</li>
  </ol>
</section>

<section class="content container-fluid">
  <div class="row">
    <div class="col-md-8">
      <div class="box box-primary">
        <div class="box-header with-border">
          <h3 class="box-title">添加客户信息</h3>
        </div>
        {% if error %}
        <div class="alert alert-danger" style="margin:10px;">{{ error }}</div>
        {% endif %}
        <form action="{% url 'myadmin_client_insert' %}" method="post">
          {% csrf_token %}
          <div class="box-body">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>客户编号（留空自动生成）</label>
                  <input type="text" name="client_no" class="form-control" placeholder="留空自动生成">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>企业性质</label>
                  <select name="nature" class="form-control">
                    {% for val, label in nature_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>企业名称 <span class="text-red">*</span></label>
              <input type="text" name="name" class="form-control" placeholder="企业名称" required>
            </div>
            <div class="form-group">
              <label>经营范围</label>
              <textarea name="business_scope" class="form-control" rows="2" placeholder="经营范围"></textarea>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>法人代表</label>
                  <input type="text" name="legal_person" class="form-control" placeholder="法人代表">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>联系人 <span class="text-red">*</span></label>
                  <input type="text" name="contact_name" class="form-control" placeholder="联系人" required>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>联系电话 <span class="text-red">*</span></label>
                  <input type="text" name="contact_phone" class="form-control" placeholder="联系电话" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>地址</label>
                  <input type="text" name="address" class="form-control" placeholder="地址">
                </div>
              </div>
            </div>
            <hr>
            <h4>缴费信息</h4>
            <div class="row">
              <div class="col-md-4">
                <div class="form-group">
                  <label>缴费开始日期</label>
                  <input type="date" name="fee_start_date" class="form-control">
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>缴费周期</label>
                  <select name="fee_cycle" class="form-control">
                    {% for val, label in cycle_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>缴费金额（元）</label>
                  <input type="number" name="fee_amount" class="form-control" step="0.01" value="0">
                </div>
              </div>
            </div>
            <hr>
            <div class="form-group">
              <label>对接会计</label>
              <select name="accountant" class="form-control">
                <option value="">--暂不分配--</option>
                {% for acc in accountants %}
                <option value="{{ acc.id }}">{{ acc.first_name }}（{{ acc.username }}）</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="box-footer">
            <button type="submit" class="btn btn-primary">提 交</button>
            <a href="{% url 'myadmin_client_index' 1 %}" class="btn btn-default">返 回</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
